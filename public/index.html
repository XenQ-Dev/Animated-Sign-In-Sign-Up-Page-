<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login-Signup Form</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark mode"><i class='bx bxs-moon'></i></button>

    <div class="scene">
    <div class="ac-stage"><div id="ac-mount"></div></div>

    <div class="wrapper">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>

        <div class="form-box login">
            <h2 class="animation" style="--i:0; --j:21;">Login</h2>
            <form action="#" id="loginForm" novalidate>
                <div class="input-box animation" style="--i:1; --j:22;">
                    <input type="email" name="email" class="js-username" required>
                    <label>Email</label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box animation" style="--i:2; --j:23;">
                    <input type="password" name="password" class="js-password" required>
                    <label>Password</label>
                    <i class='bx bxs-lock-alt js-toggle-password'></i>
                </div>
                <div class="form-msg animation" style="--i:3; --j:24;"></div>
                <button class="btn animation" type="submit" style="--i:3; --j:24;">Login</button>
                <div class="logreg-link animation" style="--i:4; --j:25;">
                    <p>Don't have an account? <br> <a href="#" class="register-link">Sign up</a></p>
                </div>
            </form>
        </div>
        <div class="info-text login">
            <h2 class="animation" style="--i:0; --j:20;">Welcome back!</h2>
            <p class="animation" style="--i:1; --j:21;">Good to see you again — sign in to pick up right where you left off.</p>
        </div>

        <div class="form-box register ">
            <h2 class="animation" style="--i:17; --j:0;">Sign up</h2>
            <form action="#" id="signupForm" novalidate>
                <div class="input-box animation" style="--i:18; --j:1;">
                    <input type="text" name="username" class="js-username" required>
                    <label>Username</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box animation" style="--i:19; --j:2;">
                    <input type="email" name="email" required>
                    <label>Email</label>
                    <i class='bx bxs-envelope' ></i>
                </div>
                <div class="input-box animation" style="--i:20; --j:3;">
                    <input type="password" name="password" class="js-password" required>
                    <label>Password</label>
                    <i class='bx bxs-lock-alt js-toggle-password'></i>
                </div>
                <div class="form-msg animation" style="--i:21; --j:4;"></div>
                <button class="btn animation" type="submit" style="--i:21; --j:4;">Sign up</button>
                <div class="logreg-link animation" style="--i:22; --j:5;">
                    <p>Already have an account? <br> <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>

        <div class="info-text register">
            <h2 class="animation" style="--i:17; --j:0;">Welcome!</h2>
            <p class="animation" style="--i:18; --j:1;">Create your account in seconds and join the fun — we're glad you're here.</p>
        </div>
    </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="animatedCharacters.js"></script>
    <script src="script.js"></script>
</body>
</html>
