<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a1f33;            /* deep ocean blue */
            color: #e6eef7;
            padding: 20px;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, .03);
            border: 2px solid #0ef;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(0, 238, 255, .35);
            padding: 40px 38px;
            text-align: center;
        }

        .avatar {
            width: 84px; height: 84px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; color: #041b29;
            background: linear-gradient(135deg, #0ef, #0077b6);
            box-shadow: 0 0 20px rgba(0, 238, 255, .5);
        }

        h1 { font-size: 26px; font-weight: 600; }
        h1 .name { color: #0ef; }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 10px;
            padding: 4px 14px;
            border-radius: 999px;
            font-size: 13px; font-weight: 600; letter-spacing: .3px;
            text-transform: uppercase;
        }
        .badge.admin { background: rgba(0, 238, 255, .15); color: #0ef; border: 1px solid #0ef; }
        .badge.user  { background: rgba(255, 255, 255, .08); color: #9fb3c8; border: 1px solid #3a536b; }

        .fields {
            margin: 26px 0 30px;
            text-align: left;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }
        .row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }
        .row i { font-size: 20px; color: #0ef; width: 24px; text-align: center; }
        .row .label { font-size: 12px; color: #7f97ad; text-transform: uppercase; letter-spacing: .4px; }
        .row .value { font-size: 15px; color: #e6eef7; font-weight: 500; }

        .btn {
            width: 100%; height: 46px;
            border: 2px solid #0ef;
            border-radius: 40px;
            background: linear-gradient(45deg, #0077b6, #0ef);
            color: #fff; font-size: 15px; font-weight: 600;
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            transition: filter .2s ease, transform .1s ease;
        }
        .btn:hover { filter: brightness(1.08); }
        .btn:active { transform: scale(.98); }

        .loading { color: #9fb3c8; font-size: 15px; }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <div class="card">
        <p class="loading" id="loading">Loading your dashboard…</p>

        <div id="content" hidden>
            <div class="avatar"><i class='bx bxs-user'></i></div>
            <h1>Welcome, <span class="name" id="uName"></span>!</h1>
            <span class="badge" id="roleBadge"></span>

            <div class="fields">
                <div class="row">
                    <i class='bx bxs-user'></i>
                    <div><div class="label">Username</div><div class="value" id="fUsername"></div></div>
                </div>
                <div class="row">
                    <i class='bx bxs-envelope'></i>
                    <div><div class="label">Email</div><div class="value" id="fEmail"></div></div>
                </div>
                <div class="row">
                    <i class='bx bxs-id-card'></i>
                    <div><div class="label">Account ID</div><div class="value" id="fId"></div></div>
                </div>
            </div>

            <button class="btn" id="logoutBtn"><i class='bx bx-log-out'></i> Log out</button>
        </div>
    </div>

    <script>
        (async () => {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) throw new Error('unauthenticated');
                const { user } = await res.json();

                document.getElementById('uName').textContent = user.username;
                document.getElementById('fUsername').textContent = user.username;
                document.getElementById('fEmail').textContent = user.email;
                document.getElementById('fId').textContent = '#' + user.id;

                const badge = document.getElementById('roleBadge');
                if (user.role === 'admin') {
                    badge.className = 'badge admin';
                    badge.innerHTML = "<i class='bx bxs-shield'></i> Admin";
                } else {
                    badge.className = 'badge user';
                    badge.innerHTML = "<i class='bx bxs-user'></i> Member";
                }

                document.getElementById('loading').hidden = true;
                document.getElementById('content').hidden = false;
            } catch {
                // not logged in → back to the login page
                window.location.replace('/');
            }
        })();

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.replace('/');
        });
    </script>
</body>
</html>
